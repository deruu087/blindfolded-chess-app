<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Memo Chess</title>
    <link rel="icon" type="image/png" href="images/chess-board.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .success-container {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .success-icon {
            font-size: 4rem;
            color: #27ae60;
            margin-bottom: 1rem;
        }

        .success-title {
            font-size: 2rem;
            color: #1e3a8a;
            margin-bottom: 1rem;
            font-weight: normal;
        }

        .success-message {
            color: #4b5563;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-primary {
            background-color: #1e3a8a;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }

        .btn-primary:hover {
            background-color: #1e40af;
        }

        .loading {
            color: #4b5563;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-message">
            Thank you for your subscription. Your account is being activated...
        </p>
        <div class="loading" id="loadingMessage">Activating your subscription...</div>
        <a href="profile.html" class="btn-primary" id="manualRedirectBtn" style="margin-top: 1rem; display: none;">
            Go to Profile
        </a>
    </div>

    <!-- Supabase JavaScript Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase Configuration -->
    <script src="supabase-config.js"></script>
    
    <!-- Supabase Helper Functions -->
    <script src="supabase-helpers.js"></script>
    
    <!-- Supabase Authentication Functions -->
    <script src="supabase-auth.js"></script>

    <script>
        // Activate subscription after successful payment
        // WEBHOOK IS THE SINGLE SOURCE OF TRUTH - This function only checks if webhook has processed the payment
        async function activateSubscription() {
            try {
                // Get payment details from URL parameters
                // Dodo Payments redirects with: payment_id and status
                const urlParams = new URLSearchParams(window.location.search);
                const paymentId = urlParams.get('payment_id') || urlParams.get('order_id') || urlParams.get('transaction_id');
                const paymentStatus = urlParams.get('status'); // 'succeeded' or 'failed'
                const email = urlParams.get('email');
                
                console.log('='.repeat(80));
                console.log('💰 [PAYMENT SUCCESS] Page loaded');
                console.log('💰 [PAYMENT SUCCESS] URL:', window.location.href);
                console.log('💰 [PAYMENT SUCCESS] URL params:', Object.fromEntries(urlParams));
                console.log('💰 [PAYMENT SUCCESS] Payment ID:', paymentId);
                console.log('💰 [PAYMENT SUCCESS] Payment Status:', paymentStatus);
                console.log('💰 [PAYMENT SUCCESS] Email:', email);
                console.log('💰 [PAYMENT SUCCESS] WEBHOOK IS SINGLE SOURCE OF TRUTH - Only checking if subscription exists');
                console.log('='.repeat(80));
                
                // Check if user is logged in
                if (typeof getCurrentUser === 'function') {
                    const user = await getCurrentUser();
                    
                    if (user) {
                        // WEBHOOK IS THE SINGLE SOURCE OF TRUTH
                        // Only check if subscription exists - do NOT create it here
                        // The webhook handler will create the subscription with correct data
                        
                        let existingSubscription = null;
                        let checkAttempts = 0;
                        const maxAttempts = 10; // Check for up to 10 seconds
                        
                        // Poll for subscription (webhook may be processing)
                        const checkSubscription = async () => {
                            if (typeof window.getUserSubscription === 'function') {
                                try {
                                    existingSubscription = await window.getUserSubscription();
                                    console.log(`🔍 [Attempt ${checkAttempts + 1}] Subscription check:`, existingSubscription);
                                    
                                    if (existingSubscription && existingSubscription.status === 'active') {
                                        // Webhook has processed the payment!
                                        console.log('✅ Subscription found - webhook processed payment successfully!');
                                        document.getElementById('loadingMessage').textContent = 'Subscription activated! Redirecting...';
                                        localStorage.setItem('cachedSubscriptionStatus', 'true');
                                        localStorage.setItem('cachedSubscriptionPlan', existingSubscription.plan_type);
                                        localStorage.removeItem('pendingSubscriptionPlan');
                                        
                                        setTimeout(() => {
                                            window.location.href = 'profile.html';
                                        }, 1500);
                                        return true; // Found subscription
                                    }
                                } catch (e) {
                                    console.log('Could not check subscription:', e);
                                }
                            }
                            return false; // Subscription not found yet
                        };
                        
                        // Check immediately
                        const found = await checkSubscription();
                        if (found) return;
                        
                        // If not found, poll every second for up to 10 seconds
                        // This handles cases where webhook is slightly delayed
                        const pollInterval = setInterval(async () => {
                            checkAttempts++;
                            const found = await checkSubscription();
                            
                            if (found) {
                                clearInterval(pollInterval);
                            } else if (checkAttempts >= maxAttempts) {
                                // Webhook hasn't processed yet - show message to wait
                                clearInterval(pollInterval);
                                console.log('⏳ Webhook not processed yet - showing wait message');
                                document.getElementById('loadingMessage').textContent = 
                                    'Payment successful! Your subscription is being processed by our system. ' +
                                    'This usually takes a few seconds. Please wait...';
                                document.getElementById('manualRedirectBtn').style.display = 'inline-block';
                                
                                // Continue checking in background (user can manually refresh)
                                // Check every 5 seconds for up to 2 minutes
                                let backgroundChecks = 0;
                                const backgroundInterval = setInterval(async () => {
                                    backgroundChecks++;
                                    const found = await checkSubscription();
                                    if (found) {
                                        clearInterval(backgroundInterval);
                                        // Redirect if found
                                        window.location.href = 'profile.html';
                                    } else if (backgroundChecks >= 24) { // 2 minutes (24 * 5 seconds)
                                        clearInterval(backgroundInterval);
                                        console.log('⚠️ Webhook still not processed after 2 minutes');
                                    }
                                }, 5000);
                            }
                        }, 1000); // Check every second
                        
                    } else {
                        // User not logged in - redirect to sign in
                        document.getElementById('loadingMessage').textContent = 'Please sign in to activate your subscription.';
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    }
                } else {
                    document.getElementById('loadingMessage').textContent = 'Error: Supabase not initialized. Please refresh the page.';
                }
            } catch (error) {
                console.error('Error checking subscription:', error);
                document.getElementById('loadingMessage').textContent = 
                    'Payment successful! Your subscription is being processed. ' +
                    'The webhook will activate it shortly. You can check your profile in a moment.';
                document.getElementById('manualRedirectBtn').style.display = 'inline-block';
            }
        }

        // Initialize Supabase and activate subscription
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Supabase
            if (typeof initSupabase === 'function') {
                initSupabase();
            }
            
            // Wait a moment for Supabase to initialize, then activate subscription
            setTimeout(activateSubscription, 500);
        });
    </script>
</body>
</html>
